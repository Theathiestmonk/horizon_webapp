services:
  - type: web
    name: texthorizon-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: BASE_DOWNLOAD_URL
        value: https://horizon-webapp.onrender.com/output
